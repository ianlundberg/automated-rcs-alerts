name: Deploy legal docs to GitHub Pages

# Builds every app in the monorepo and publishes the combined site to GitHub Pages.
# Each app is served under its own path (e.g. /brick-alerts/); site-root/ is the
# umbrella landing at the root. Pages source = GitHub Actions
# (Repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions).

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "site-root/**"
      - "scripts/**"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Using `npm install` (not `npm ci`) because no package-lock.json is
      # committed yet. Once you have Node locally and run `npm install`, commit
      # the generated lock file and you can switch this to `npm ci`.
      - name: Install dependencies
        run: npm install

      - name: Build all apps and assemble the combined site
        run: npm run build:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
